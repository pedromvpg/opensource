<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Open source hub outreach contact directory — distribute developer tickets and amplify conference Open Source Hubs across regions." />
<meta name="application-name" content="Outreach contacts" />
<title>Outreach contacts · Open source hub</title>
<script>
(function () {
  var t = localStorage.getItem("osh-theme");
  if (!t && window.matchMedia("(prefers-color-scheme: light)").matches) t = "light";
  document.documentElement.setAttribute("data-theme", t || "dark");
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root,
  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #000;
    --bg-2: #000;
    --panel: #000;
    --panel-hover: #0a0a0a;
    --ink: #fff;
    --ink-soft: rgba(255,255,255,0.62);
    --ink-muted: rgba(255,255,255,0.42);
    --ink-faint: rgba(255,255,255,0.28);
    --border: rgba(255,255,255,0.10);
    --border-soft: rgba(255,255,255,0.06);
    --surface-subtle: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.06);
    --controls-bg: rgba(0,0,0,0.95);
    --link-bg: rgba(255,255,255,0.04);
    --link-hover-bg: rgba(255,255,255,0.08);
    --link-hover-border: rgba(255,255,255,0.3);
    --card-hover-border: rgba(255,255,255,0.22);
    --section-caveat-bg: rgba(232,185,59,0.07);
    --section-caveat-border: rgba(232,185,59,0.22);
    --section-caveat-text: rgba(255,255,255,0.7);
    --accent: #FF9500;
    --ok: #3ecf8e;
    --warn: #e8b93b;
    --dead: #ef5f5f;
    --star: #FF9500;
    --font-display: 'Geist', system-ui, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, monospace;
    --font-inter: 'Inter', system-ui, sans-serif;
  }

  html[data-theme="light"] {
    color-scheme: light;
    --bg: #f4f4f5;
    --bg-2: #ebebed;
    --panel: #fff;
    --panel-hover: #f0f0f2;
    --ink: #0a0a0a;
    --ink-soft: rgba(0,0,0,0.62);
    --ink-muted: rgba(0,0,0,0.45);
    --ink-faint: rgba(0,0,0,0.32);
    --border: rgba(0,0,0,0.12);
    --border-soft: rgba(0,0,0,0.07);
    --surface-subtle: rgba(0,0,0,0.03);
    --surface-hover: rgba(0,0,0,0.05);
    --controls-bg: rgba(244,244,245,0.95);
    --link-bg: rgba(0,0,0,0.04);
    --link-hover-bg: rgba(0,0,0,0.07);
    --link-hover-border: rgba(0,0,0,0.22);
    --card-hover-border: rgba(0,0,0,0.2);
    --section-caveat-bg: rgba(232,185,59,0.12);
    --section-caveat-border: rgba(232,185,59,0.35);
    --section-caveat-text: rgba(0,0,0,0.72);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; background: var(--bg); }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  a { color: inherit; text-decoration: none; }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
  .wrap.hub-shell { max-width: none; width: 100%; }
  .hub-shell {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    width: 100%;
  }
  .hub-shell .stats { flex-shrink: 0; }

  .hub-bar,
  header.top { flex-shrink: 0; }
  .hub-bar {
    width: 100%;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .hub-brand {
    width: 100%;
    margin: 0;
    padding: 18px 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--bg);
    font-family: var(--font-inter);
    text-transform: uppercase;
    color: var(--ink);
  }
  .hub-brand-main {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: clamp(14px, 4.5vw, 32px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.06em;
  }
  .hub-brand-sub {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: clamp(9px, 1.8vw, 12px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: 0.12em;
    color: var(--ink-muted);
  }
  html[data-theme="dark"] .hub-brand-sub {
    color: var(--ink-soft);
  }

  .theme-toggle {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--ink-soft);
    cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .theme-toggle:hover { color: var(--ink); border-color: var(--card-hover-border); }
  .theme-toggle svg { width: 16px; height: 16px; }
  .theme-toggle .icon-sun { display: none; }
  html[data-theme="light"] .theme-toggle .icon-moon { display: none; }
  html[data-theme="light"] .theme-toggle .icon-sun { display: block; }

  html[data-theme="light"] .event-tab-logo { filter: brightness(0); }

  /* ---------- Header ---------- */
  header.top {
    padding: 32px 0 28px;
    border-bottom: 1px solid var(--border-soft);
  }
  .event-tabs {
    display: flex; justify-content: center; gap: 0; margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .event-tab {
    padding: 14px 20px 12px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    margin-bottom: -1px;
    transition: border-color .15s, opacity .15s;
    opacity: 0.45;
  }
  .event-tab:hover { opacity: 0.75; }
  .event-tab.active { opacity: 1; border-bottom-color: var(--accent); }
  .event-tab-logo {
    height: 22px;
    width: auto;
    display: block;
    pointer-events: none;
  }
  .event-tab[data-event="btc-2027"] .event-tab-logo { height: 17px; }

  .empty-event {
    text-align: center; color: var(--ink-muted);
    padding: 80px 24px; font-family: var(--font-inter); font-size: 15px;
    border: 1px solid var(--border); background: var(--panel);
  }

  /* ---------- Stats ---------- */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px; margin: 28px 0 4px;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--border);
    padding: 18px 20px;
  }
  .stat .num {
    font-family: var(--font-mono);
    font-size: 30px; font-weight: 500; letter-spacing: -0.04em;
  }
  .stat .lbl {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--ink-muted); margin-top: 4px;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .stat.ok .num { color: var(--ok); }
  .stat.warn .num { color: var(--warn); }
  .stat.accent .num { color: var(--accent); }

  /* ---------- Strategy ---------- */
  .strategy {
    margin-top: 28px;
    border: 1px solid var(--border);
    background: var(--panel);
  }
  .strategy-head {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .strategy-head h2 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .strategy-head p {
    margin-top: 6px;
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 720px;
  }
  .strategy-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border-bottom: 1px solid var(--border-soft);
    overflow-x: auto;
  }
  .strategy-tab {
    flex-shrink: 0;
    padding: 11px 16px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--ink-muted);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .strategy-tab:hover { color: var(--ink-soft); }
  .strategy-tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }
  .strategy-body { padding: 20px 22px 22px; }
  .strategy-panel { display: none; }
  .strategy-panel.active { display: block; }
  .strategy-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.15fr);
    gap: 22px;
  }
  .strategy-block h3 {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin-bottom: 10px;
  }
  .strategy-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .strategy-points li {
    font-size: 13.5px;
    color: var(--ink-soft);
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }
  .strategy-points li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.55em;
    width: 5px;
    height: 5px;
    background: var(--accent);
  }
  .strategy-points strong { color: var(--ink); font-weight: 600; }
  .strategy-audience {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }
  .strategy-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 4px 8px;
    border: 1px solid var(--border);
    color: var(--ink-muted);
    background: var(--surface-subtle);
  }
  .track-contacts {
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1px solid var(--border-soft);
  }
  .track-contacts-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .track-contacts-count {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }
  .track-contacts .grid { margin-top: 0; }
  .track-contacts .table-wrap { margin-top: 16px; }
  .msg-sample {
    border: 1px solid rgba(0, 0, 0, 0.14);
    background: #fff;
    padding: 14px 16px;
    position: relative;
  }
  .msg-sample pre {
    font-family: var(--font-display);
    font-size: 13.5px;
    line-height: 1.55;
    color: #1a1a1a;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
  }
  .msg-sample .template-var,
  .partnership-modal-body .template-var {
    color: #0a0a0a;
    font-weight: 700;
    background: rgba(255, 149, 0, 0.14);
    border-radius: 2px;
    padding: 0 2px;
  }
  .msg-copy {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 11px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--ink-soft);
    font-family: var(--font-display);
    font-size: 12px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .msg-copy:hover { color: var(--ink); border-color: var(--card-hover-border); }
  .msg-copy.copied { color: var(--ok); border-color: var(--ok); }
  .msg-channel {
    margin-top: 12px;
    font-size: 12.5px;
    color: var(--ink-muted);
    font-family: var(--font-mono);
  }
  .msg-channel span { color: var(--ink-soft); }
  @media (max-width: 900px) {
    .strategy-grid { grid-template-columns: 1fr; }
  }
  .strategy + .stats { margin-top: 16px; }

  /* ---------- Hub vertical tabs ---------- */
  .hub-layout.hub-nav-collapsed {
    grid-template-columns: 52px minmax(0, 1fr);
  }
  .hub-nav-collapse-wrap {
    flex-shrink: 0;
    padding: 4px 10px 8px;
    border-bottom: 1px solid var(--border-soft);
  }
  .hub-nav-collapse {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 32px;
    padding: 0;
    background: transparent;
    border: 1px solid var(--border-soft);
    color: var(--ink-muted);
    cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .hub-nav-collapse:hover {
    color: var(--ink);
    border-color: var(--card-hover-border);
    background: var(--surface-hover);
  }
  .hub-nav-collapse svg { width: 16px; height: 16px; flex-shrink: 0; }
  .hub-nav-collapse .collapse-icon-collapsed { display: none; }
  .hub-layout.hub-nav-collapsed .hub-nav-collapse .collapse-icon-expanded { display: none; }
  .hub-layout.hub-nav-collapsed .hub-nav-collapse .collapse-icon-collapsed { display: block; }
  .hub-layout.hub-nav-collapsed .hub-nav-label,
  .hub-layout.hub-nav-collapsed .hub-nav-tab-label,
  .hub-layout.hub-nav-collapsed .hub-nav-count {
    display: none;
  }
  .hub-layout.hub-nav-collapsed .hub-nav-tab {
    justify-content: center;
    padding: 9px 6px;
    gap: 0;
  }
  .hub-layout.hub-nav-collapsed .hub-nav-tab .flag { font-size: 16px; }
  .hub-layout.hub-nav-collapsed .hub-nav-collapse-wrap {
    padding: 4px 6px 8px;
  }
  .hub-layout.hub-nav-collapsed .hub-nav-footer {
    padding: 12px 6px 4px;
  }
  .hub-layout.hub-nav-collapsed .hub-nav-theme {
    width: 100%;
    height: 32px;
  }
  .hub-layout {
    display: grid;
    grid-template-columns: minmax(200px, 240px) minmax(0, 1fr);
    align-items: stretch;
    flex: 1 1 auto;
    min-height: 0;
    margin-top: 20px;
    border: 1px solid var(--border);
    background: var(--panel);
    overflow: hidden;
  }
  .hub-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 10px 0 14px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    align-self: stretch;
    min-height: 0;
    height: 100%;
    overflow: hidden;
  }
  #hubNavTabs {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-height: 0;
  }
  .hub-nav-label {
    padding: 14px 16px 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
  }
  .hub-nav-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
    padding: 9px 16px;
    background: transparent;
    border: none;
    border-left: 2px solid transparent;
    color: var(--ink-muted);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: color .15s, background .15s, border-color .15s;
  }
  .hub-nav-tab:hover { color: var(--ink-soft); background: var(--surface-hover); }
  .hub-nav-tab.active {
    color: var(--ink);
    border-left-color: var(--accent);
    background: var(--surface-hover);
  }
  .hub-nav-tab .flag { flex-shrink: 0; font-size: 14px; line-height: 1; }
  .hub-nav-tab .hub-nav-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-faint);
  }
  .hub-nav-footer {
    margin-top: auto;
    padding: 12px 16px 4px;
    border-top: 1px solid var(--border-soft);
  }
  .hub-nav-theme { width: 100%; }
  .hub-main {
    min-width: 0;
    min-height: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .hub-panels {
    min-width: 0;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }
  .hub-panel[hidden] { display: none !important; }
  .hub-panel { display: none; }
  .hub-panel.active { display: block; }
  .hub-panel .hub-panel-body { padding: 0 22px 22px; }
  .hub-panel .sample-graphics {
    margin-top: 0;
    border: none;
  }
  .section-campaign {
    margin-bottom: 22px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border-soft);
  }
  .section-campaign-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }
  .section--track .section-note.track-hint {
    margin-top: 0;
    margin-bottom: 0;
    font-size: 13px;
    color: var(--ink-muted);
  }
  .hub-panel .section { margin-top: 0; scroll-margin-top: 0; padding: 20px 22px 28px; }
  .hub-panel .section:first-child { margin-top: 0; }
  .contact-toolbar {
    position: sticky;
    top: 0;
    z-index: 20;
    margin-top: 0;
    border-bottom: 1px solid var(--border-soft);
    border-top: none;
    padding: 6px 0;
    flex-shrink: 0;
  }
  .contact-toolbar > .wrap {
    max-width: none;
    padding: 0 22px;
  }
  .contact-toolbar .controls-inner {
    flex-wrap: nowrap;
    gap: 8px;
  }
  .contact-toolbar .search {
    flex: 1 1 0;
    min-width: 0;
    max-width: 240px;
  }
  .contact-toolbar .search input {
    padding: 6px 10px 6px 30px;
    font-size: 13px;
  }
  .contact-toolbar .search svg {
    left: 10px;
    width: 14px;
    height: 14px;
  }
  .contact-toolbar .shortlist-toggle,
  .contact-toolbar .conf-toggle {
    padding: 5px 8px;
    font-size: 12px;
    gap: 4px;
    white-space: nowrap;
  }
  .contact-toolbar .conf-filter {
    gap: 4px;
    flex-shrink: 0;
  }
  .contact-toolbar .view-btn {
    padding: 5px 9px;
    font-size: 12px;
    gap: 4px;
  }
  .contact-toolbar .view-btn svg {
    width: 13px;
    height: 13px;
  }
  .contact-toolbar .controls-end {
    gap: 6px;
  }
  .hub-panel .no-results { margin: 40px 24px; }
  @media (max-width: 900px) {
    .hub-layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
    .hub-layout.hub-nav-collapsed { grid-template-columns: 1fr; }
    .hub-nav-collapse-wrap { display: none; }
    .hub-main { height: auto; overflow: visible; }
    .hub-panels { overflow: visible; }
    .hub-nav {
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: none;
      min-height: 0;
      height: auto;
      align-self: auto;
      position: relative;
      top: auto;
      padding: 8px 10px;
      gap: 4px;
    }
    .hub-nav-label { display: none; }
    .hub-nav-tab {
      width: auto;
      flex-shrink: 0;
      border-left: none;
      border-bottom: 2px solid transparent;
      padding: 8px 12px;
      white-space: nowrap;
    }
    .hub-nav-tab.active { border-left-color: transparent; border-bottom-color: var(--accent); }
    .hub-nav-tab .hub-nav-count { display: none; }
  }

  /* ---------- Sample graphics ---------- */
  .sample-graphics {
    margin-top: 16px;
    border: 1px solid var(--border);
    background: var(--panel);
  }
  .sample-graphics-head {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .sample-graphics-head h2 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .sample-graphics-head p {
    margin-top: 6px;
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 720px;
  }
  .sample-graphics-body { padding: 20px 22px 22px; }
  .sample-graphics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .graphic-card {
    border: 1px solid var(--border);
    background: var(--surface-subtle);
    display: flex;
    flex-direction: column;
  }
  .graphic-preview {
    background: #0a0a0a;
    border-bottom: 1px solid var(--border-soft);
    padding: 12px;
  }
  html[data-theme="light"] .graphic-preview { background: #111; }
  .graphic-preview-frame {
    width: 100%;
    border: 1px solid var(--border-soft);
    overflow: hidden;
    background: #000;
  }
  .graphic-preview-frame--square { aspect-ratio: 1 / 1; max-height: 300px; }
  .graphic-preview-frame--banner { aspect-ratio: 1200 / 630; }
  .graphic-preview-frame--story {
    aspect-ratio: 9 / 16;
    max-height: 400px;
    max-width: 225px;
    margin: 0 auto;

function activeEvent() { return EVENTS[state.event]; }
function activeSections() { return activeEvent().sections; }
function activeShortlist() { return activeEvent().shortlist; }
function isShortlistItem(item) {
  return activeShortlist().includes(item.name) || !!item.star;
}

function renderEventTabs() {
  document.getElementById("eventTabs").innerHTML = Object.entries(EVENTS).map(([id, ev]) =>
    `<button type="button" class="event-tab${id === state.event ? " active" : ""}" data-event="${id}" aria-label="${ev.label}">
      <img class="event-tab-logo" src="${ev.logo}" alt="" />
    </button>`
  ).join("");
}

function updateEventHeader() {
  const ev = activeEvent();
  document.title = `Outreach contacts — ${ev.label}`;
  document.querySelectorAll(".event-tab").forEach(tab => {
    tab.classList.toggle("active", tab.dataset.event === state.event);
  });
  const src = document.getElementById("dataSource");
  if (src) src.textContent = ev.dataSource || "—";
  renderSampleGraphics();
  updateHubPanelsVisibility();
}

function trackCampaigns() {
  const strategies = activeEvent().strategy || STRATEGY;
  return strategies.filter((s) => TRACK_CAMPAIGN_IDS.includes(s.id));
}

function isTrackCampaignId(id) {
  return TRACK_CAMPAIGN_IDS.includes(id);
}

function campaignForSection(sectionId) {
  const ev = activeEvent();
  const strategies = ev.strategy || STRATEGY;
  const seg = strategies.find((s) => s.id === sectionId);
  if (seg) return seg;
  const regions = ev.regionTemplates || REGION_TEMPLATES;
  return regions.find((r) => r.id === sectionId) || null;
}

function itemBlob(item) {
  return [item.name, item.org, item.angle, ...(item.tags || [])].join(" ").toLowerCase();
}

function hasTag(item, ...needles) {
  const tags = (item.tags || []).map((t) => t.toLowerCase());
  return needles.some((n) => tags.some((t) => t.includes(n.toLowerCase())));
}

function blobHas(item, re) {
  return re.test(itemBlob(item));
}

function matchesTrackContact(entry, trackId) {
  const { item, sectionId, groupTitle } = entry;
  if (item.conf === "dead") return false;
  const group = (groupTitle || "").toLowerCase();

  switch (trackId) {
    case "t-bitcoin":
      if (sectionId === "opensource-nostr-speakers") return true;
      if (hasTag(item, "bitcoin")) return true;
      if (blobHas(item, /bitcoin|lightning|nostr|bitdev|bitshala|bitpleb|satoshi|miniscript|damus|fulgur|diamond.?hand|btcstudy|philippine bitcoin|bloom|chamber of commerce|bahk|lightning hackday/i)) return true;
      if (sectionId === "influencers" && blobHas(item, /bitcoin|lightning|nostr|mining|mcp|btcstudy|bitdev|association of hk/i)) return true;
      if (sectionId === "india" && blobHas(item, /bitcoin|lightning|nostr|core|protocol|bdk|cln|ldk|fedimint|educator|meetup|community/i)) return true;
      if (sectionId === "japan") return blobHas(item, /bitcoin|lightning|nostr|btc|ln\/|protocol|bitbank|fulgur/i);
      if (sectionId === "korea") return blobHas(item, /bitcoin/i);
      if (sectionId === "taiwan") return blobHas(item, /bitdev|btcstudy|bitcoin/i);
      if (sectionId === "philippines" && /bitcoin|lightning/.test(group)) return true;
      if (sectionId === "singapore" && /bitcoin|lightning/.test(group)) return true;
      if (sectionId === "hongkong" && blobHas(item, /bitcoin|lightning|bitc|bahk/i)) return true;
      return false;
    case "t-ai":
      if (sectionId === "influencers" && blobHas(item, /ai|agent|mcp|animoca|inference|private/i)) return true;
      if (blobHas(item, /agentic|genai|\bai\b|artificial intelligence|inference|llm|encode|easya|preface ai|hack4sdg|ethtaipei|web3.*ai|fintech.*ai|gdg.*ai/i)) return true;
      if (hasTag(item, "cross-campus") && blobHas(item, /gdg|ai|hackathon|agentic/i)) return true;
      return false;
    case "t-students":
      if (hasTag(item, "university", "bootcamp", "cross-campus")) return true;
      return blobHas(item, /student|society|club|campus|gdsc|gdg on campus|hackers|bootcamp|ideathon|ftsa|blockchain club|csess|fintech soc/i);
    case "t-oss":
      if (hasTag(item, "open-source", "developers")) return true;
      if (blobHas(item, /opensource|open.source|hkoscon|hkpug|nus hackers|g0v|coscup|dim sum|python hk|gdsc|hackers|linux/i)) return true;
      if (sectionId === "india" && blobHas(item, /oss|open.source|educator|nostr|lightning tooling/i)) return true;
      if (sectionId === "philippines" && hasTag(item, "university") && blobHas(item, /gdsc|gdg|cursor|alliance|society/i)) return true;
      return false;
    case "recognition":
      return isPriorityItem(item) || isShortlistItem(item) || !!item.partnership || hasTag(item, "priority", "community", "hub");
    default:
      return true;
  }
}

function contactDedupeKey(item) {
  const email = (item.links || []).find((l) => l.t === "email")?.v?.toLowerCase().trim();
  if (email) return `email:${email}`;
  const x = (item.links || []).find((l) => l.t === "x")?.v?.toLowerCase().trim();
  if (x) return `x:${x}`;
  const name = (item.name || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
  return `name:${name}`;
}

function contactEntryRank(item) {
  if (isShortlistItem(item)) return 0;
  if (isPriorityItem(item)) return 1;
  return 2;
}

function trackContactEntries(trackId, campaign) {
  const sectionIds = new Set((campaign.targets || []).map((t) => t.section));
  const out = [];
  activeSections().forEach((sec) => {
    if (!sectionIds.has(sec.id)) return;
    sec.groups.forEach((g) => {
      g.items.forEach((item) => {
        const entry = { item, sectionId: sec.id, sectionTitle: sec.title, groupTitle: g.title };
        if (matchesTrackContact(entry, trackId)) out.push(entry);
      });
    });
  });
  const byKey = new Map();
  out.forEach((entry) => {
    const key = contactDedupeKey(entry.item);
    const prev = byKey.get(key);
    if (!prev) {
      byKey.set(key, entry);
      return;
    }
    const rankA = contactEntryRank(entry.item);
    const rankB = contactEntryRank(prev.item);
    if (rankA < rankB || (rankA === rankB && (entry.item.angle || "").length > (prev.item.angle || "").length)) {
      byKey.set(key, entry);
    }
  });
  const deduped = [...byKey.values()];
  deduped.sort((a, b) => {
    const rank = (it) => (isShortlistItem(it) ? 0 : isPriorityItem(it) ? 1 : 2);
    const d = rank(a.item) - rank(b.item);
    return d !== 0 ? d : a.item.name.localeCompare(b.item.name);
  });
  return deduped;
}

function hubNavItems() {
  const ev = activeEvent();
  const items = [];
  const tracks = trackCampaigns();
  if (tracks.length) {
    items.push({ divider: true, label: "By track" });
    tracks.forEach((track) => {
      items.push({ id: track.id, flag: track.flag, label: track.label });
    });
  }
  if (ev.sampleGraphics?.length) items.push({ id: "graphics", flag: "🎨", label: "Sample graphics" });
  const sections = ev.sections || [];
  if (sections.length) {
    items.push({ divider: true, label: "Contacts" });
    sections.forEach((sec) => {
      const count = sec.groups.reduce((n, g) => n + g.items.length, 0);
      items.push({ id: sec.id, flag: sec.flag, label: sec.title, count });
    });
  }
  return items;
}

function setHubTab(tab, { syncUrl = true } = {}) {
  const items = hubNavItems();
  if (!items.some((i) => !i.divider && i.id === tab)) {
    const first = items.find((i) => !i.divider);
    tab = first ? first.id : tab;
  }
  state.hubTab = tab;
  localStorage.setItem("osh-hub-tab", tab);
  syncHubPanels(tab);

  document.querySelectorAll(".hub-nav-tab").forEach((btn) => {

    btn.classList.toggle("active", active);

  document.querySelectorAll(".hub-panel").forEach((panel) => {
    const active = panel.dataset.panel === tab;
    panel.classList.toggle("active", active);
    panel.setAttribute("aria-hidden", active ? "false" : "true");

  const toolbar = document.getElementById("contactToolbar");
  if (toolbar) toolbar.classList.toggle("hidden", !isContactHubTab(tab));

function escHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function highlightTemplateVarsHtml(escaped) {
  return escaped.replace(/(\[[^\]]+\]|\{\{[^}]+\}\})/g, '<span class="template-var">$1</span>');
}

function formatTemplatePreview(text) {
  return highlightTemplateVarsHtml(escHtml(text || ""));
}

function fillOutreachTemplateHtml(text, item) {
  if (!text) return "";
  const community = item.org || item.name;
  const project = item.angle || item.org || "work";
  const greetingName = outreachGreetingName(item);
  const wrap = (v) => `<span class="template-var">${escHtml(v)}</span>`;
  const entries = [
    [/\[name\]/gi, greetingName],
    [/\{\{name\}\}/gi, greetingName],
    [/\[society\]/gi, community],
    [/\[community\]/gi, community],
    [/\[club\]/gi, item.name],
    [/\[NUS Hackers \/ your society\]/gi, item.name],
    [/\[project \/ work\]/gi, project],
    [/\[CLAIM LINK\]/g, OUTREACH_DEFAULTS.claimLink],
    [/\[CODE\]/g, OUTREACH_DEFAULTS.code],
  ];
  const tokens = new Map();
  let i = 0;
  let work = text;
  for (const [re, val] of entries) {
    work = work.replace(re, () => {
      const token = `@@VAR${i++}@@`;
      tokens.set(token, wrap(val));
      return token;
    });
  }
  let html = escHtml(work);
  for (const [token, replacement] of tokens) {
    html = html.split(token).join(replacement);
  }
  return highlightTemplateVarsHtml(html);
}

function bindMsgCopy() {
  document.querySelectorAll(".msg-copy[data-campaign-id]").forEach((btn) => {
    btn.onclick = async () => {
      const campaign = campaignForSection(btn.dataset.campaignId);
      if (!campaign?.sample) return;
      try {
        await navigator.clipboard.writeText(campaign.sample);
        btn.classList.add("copied");
        btn.textContent = "Copied";
        setTimeout(() => {
          btn.classList.remove("copied");
          btn.textContent = "Copy message";
        }, 1600);
      } catch (_) {}
    };
  });
}

function normalizeHubTab(tab) {
  const items = hubNavItems();
  if (items.some((i) => !i.divider && i.id === tab)) return tab;
  const first = items.find((i) => !i.divider);
  return first ? first.id : tab;
}

function switchEvent(eventId) {
  if (!EVENTS[eventId] || state.event === eventId) return;
  state.event = eventId;
  state.q = "";
  state.hubTab = normalizeHubTab(localStorage.getItem("osh-hub-tab") || "influencers");
  document.getElementById("search").value = "";
  localStorage.setItem("osh-event", eventId);
  updateEventHeader();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function buildLink(l) {
  const t = l.t;
  const v = l.v;
  let url = "#", label = l.label || v, kind = t, icon = ICONS.web;
  switch (t) {
    case "x": url = `https://x.com/${v}`; label = l.label || `@${v}`; icon = ICONS.x; break;
    case "github": url = `https://github.com/${v}`; label = l.label || v; icon = ICONS.github; break;
    case "telegram": url = `https://t.me/${v}`; label = l.label || `@${v}`; icon = ICONS.telegram; break;
    case "telegram_url": url = v; icon = ICONS.telegram; kind = "telegram"; break;
    case "discord": url = `https://discord.gg/${v}`; label = l.label || "Discord"; icon = ICONS.discord; break;
    case "facebook": url = `https://facebook.com/${v}`; label = l.label || "Facebook"; icon = ICONS.facebook; break;
    case "instagram": url = `https://instagram.com/${v}`; label = l.label || `@${v}`; icon = ICONS.instagram; break;
    case "threads": url = `https://threads.net/@${v}`; label = l.label || `@${v}`; icon = ICONS.threads; break;
    case "youtube": url = `https://youtube.com/@${v}`; label = l.label || v; icon = ICONS.youtube; break;
    case "meetup": url = `https://meetup.com/${v}`; label = l.label || "Meetup"; icon = ICONS.meetup; break;
    case "luma": url = `https://luma.com/${v}`; label = l.label || "Luma"; icon = ICONS.luma; break;
    case "web": url = `https://${v}`; label = l.label || v; icon = ICONS.web; break;
    case "web_url": url = v; icon = ICONS.web; kind = "web"; break;
    case "email": url = `mailto:${v}`; label = l.label || v; icon = ICONS.email; break;
    case "phone": url = `tel:${v}`; label = l.label || v; icon = ICONS.phone; break;
    case "linkedin": url = `https://linkedin.com/${v}`; label = l.label || "LinkedIn"; icon = ICONS.linkedin; break;
    case "linktree": url = `https://linktr.ee/${v}`; label = l.label || "Linktree"; icon = ICONS.linktree; break;
    case "whatsapp": url = `https://wa.me/${v.replace(/\D/g,'')}`; label = l.label || v; icon = ICONS.whatsapp; break;
    case "nostr": url = `https://njump.me/${v}`; label = l.label || v.slice(0, 16) + "…"; icon = ICONS.nostr; break;
    case "wechat": return `<span class="link copy" data-copy="${v}" title="Copy WeChat ID">${ICONS.wechat}<span>WeChat: ${v}</span></span>`;
    case "qq": return `<span class="link copy" data-copy="${v}" title="Copy QQ">${ICONS.qq}<span>QQ: ${v}</span></span>`;
  }
  if (t === "email") {
    return `<a class="link" href="${url}">${icon}<span>${label}</span></a>`;
  }
  return `<a class="link" href="${url}" target="_blank" rel="noopener">${icon}<span>${label}</span></a>`;
}

function partnershipMailto(item) {
  const p = item.partnership;
  if (!p) return null;
  const to = p.to || primaryEmail(item);
  if (!to) return null;
  return buildMailtoUrl({ to, subject: p.subject || "", body: p.body || "" });
}

const OUTREACH_DEFAULTS = {
  claimLink: "https://asia.b.tc/claim",
  code: "OSH2026",
};


function primaryEmail(item) {
  return (item.links || []).find((l) => l.t === "email")?.v || "";
}

function strategyForSection(sectionId) {
  return campaignForSection(sectionId) || (activeEvent().regionTemplates || REGION_TEMPLATES)[0];
}

function outreachGreetingName(item) {
  const name = (item.name || "").trim();
  if (!name) return "there";
  const nickMatch = name.match(/"([^"]+)"/);
  if (nickMatch) return nickMatch[1];
  const handle = name.match(/^([^(]+)\s*\(/);
  if (handle && !handle[1].includes(" ")) return handle[1].trim();
  const base = name.split(/[,(]/)[0].trim();
  const honorific = base.replace(/^(Dr\.|Mr\.|Ms\.|Prof\.)\s+/i, "");
  const parts = honorific.split(/\s+/).filter(Boolean);
  if (parts.length <= 1) return parts[0] || name;
  const orgSecond = /^(Hackers|Bitcoiners|Meetup|Academy|Association|Alliance|Society|Club|DAO|Devs|Summit|Space|Base|Garage|Ventures|Hub|Foundation|Chamber|Hackathon|Bitcoiners|Ideathon|Enthusiasts|Academia|Bitcoiners)$/i;
  if (parts.length >= 3 || (parts.length === 2 && orgSecond.test(parts[1]))) return base;
  return parts[0];
}

function fillOutreachTemplate(text, item) {
  const community = item.org || item.name;
  const project = item.angle || item.org || "work";
  const greetingName = outreachGreetingName(item);
  return text
    .replace(/\[name\]/gi, greetingName)
    .replace(/\{\{name\}\}/gi, greetingName)
    .replace(/\[society\]/gi, community)
    .replace(/\[community\]/gi, community)
    .replace(/\[club\]/gi, item.name)
    .replace(/\[NUS Hackers \/ your society\]/gi, item.name)
    .replace(/\[project \/ work\]/gi, project)
    .replace(/\[CLAIM LINK\]/g, OUTREACH_DEFAULTS.claimLink)
    .replace(/\[CODE\]/g, OUTREACH_DEFAULTS.code);
}

function parseOutreachSample(sample) {
  const match = sample.match(/^Subject:\s*(.+)\n\n([\s\S]*)$/);
  if (match) return { subject: match[1].trim(), body: match[2].trim() };
  const loose = sample.match(/^Subject:\s*(.+)\n([\s\S]*)$/);
  if (loose) return { subject: loose[1].trim(), body: loose[2].trim() };
  return { subject: "", body: sample.trim() };
}

function buildTemplateOutreach(item, sectionId) {
  const strategy = strategyForSection(sectionId);
  const filled = fillOutreachTemplate(strategy.sample, item);
  const { subject, body } = parseOutreachSample(filled);
  const raw = parseOutreachSample(strategy.sample);
  return {
    to: primaryEmail(item),
    subject,
    body,
    subjectHtml: raw.subject ? fillOutreachTemplateHtml(raw.subject, item) : "",
    bodyHtml: fillOutreachTemplateHtml(raw.body || strategy.sample, item),
    label: "Outreach message",
    name: item.name,
    channel: strategy.channel || "",
  };
}

const outreachStore = new Map();
let outreachSeq = 0;

function registerOutreachMessage(data) {
  const id = `o${++outreachSeq}`;
  outreachStore.set(id, data);
  return id;
}

function buildMailtoUrl({ to, subject, body }) {
  const qs = [];
  if (subject) qs.push(`subject=${encodeURIComponent(subject)}`);
  if (body) qs.push(`body=${encodeURIComponent(body)}`);
  return `mailto:${to}${qs.length ? `?${qs.join("&")}` : ""}`;
}

function buildTrackTemplateOutreach(item, trackId, sectionId) {
  const strategies = activeEvent().strategy || STRATEGY;
  const strategy = strategies.find((s) => s.id === trackId);
  if (!strategy?.sample) return buildTemplateOutreach(item, sectionId);
  const filled = fillOutreachTemplate(strategy.sample, item);
  const { subject, body } = parseOutreachSample(filled);
  const raw = parseOutreachSample(strategy.sample);
  return {
    to: primaryEmail(item),
    subject,
    body,
    subjectHtml: raw.subject ? fillOutreachTemplateHtml(raw.subject, item) : "",
    bodyHtml: fillOutreachTemplateHtml(raw.body || strategy.sample, item),
    label: "Outreach message",
    name: item.name,
    channel: strategy.channel || "",
  };
}

function messageCTAHTML(item, sectionId, trackId) {
  const data = trackId
    ? buildTrackTemplateOutreach(item, trackId, sectionId)
    : buildTemplateOutreach(item, sectionId);
  const id = registerOutreachMessage(data);
  return `<button type="button" class="outreach-msg-cta" data-outreach-id="${id}">${ICONS.message}<span>Message</span></button>`;
}

function partnershipCTAHTML(item) {
  const p = item.partnership;
  if (!p) return "";
  const to = p.to || primaryEmail(item);
  if (!to) return "";
  const id = registerOutreachMessage({
    to,
    subject: fillOutreachTemplate(p.subject || "", item),
    body: fillOutreachTemplate(p.body || "", item),
    subjectHtml: p.subject ? fillOutreachTemplateHtml(p.subject, item) : "",
    bodyHtml: fillOutreachTemplateHtml(p.body || "", item),
    label: p.label || "Partnership proposal",
    name: item.name,
    channel: "",
  });
  return `<button type="button" class="partnership-cta" data-outreach-id="${id}">${ICONS.email}<span>${escHtml(p.label || "Partnership proposal")}</span></button>`;
}

let outreachModalData = null;

function openOutreachModal(id) {
  const data = outreachStore.get(id);
  if (!data) return;
  outreachModalData = data;
  const modal = document.getElementById("partnershipModal");
  document.getElementById("partnershipModalTitle").textContent = data.label;
  const meta = data.to
    ? `${data.name} · ${data.to}`
    : [data.name, data.channel].filter(Boolean).join(" · ");
  document.getElementById("partnershipModalMeta").textContent = meta;
  document.getElementById("partnershipModalSubject").innerHTML = data.subject
    ? `<strong>Subject:</strong> ${data.subjectHtml || escHtml(data.subject)}`
    : "";
  document.getElementById("partnershipModalBody").innerHTML = data.bodyHtml || formatTemplatePreview(data.body);
  const sendBtn = document.getElementById("partnershipModalSend");
  if (data.to) {
    sendBtn.href = buildMailtoUrl(data);
    sendBtn.hidden = false;
  } else {
    sendBtn.hidden = true;
  }
  const copyBtn = document.getElementById("partnershipModalCopy");
  copyBtn.classList.remove("copied");
  copyBtn.textContent = "Copy message";
  modal.hidden = false;
  document.body.style.overflow = "hidden";
}

function closeOutreachModal() {
  const modal = document.getElementById("partnershipModal");
  if (!modal || modal.hidden) return;
  modal.hidden = true;
  document.body.style.overflow = "";
  outreachModalData = null;
}

function bindOutreachModal() {
  if (bindOutreachModal.done) return;
  bindOutreachModal.done = true;
  document.addEventListener("click", (e) => {
    const hubTabBtn = e.target.closest(".hub-nav-tab");
    if (hubTabBtn?.dataset.hubTab) {
      setHubTab(hubTabBtn.dataset.hubTab);
      return;
    }
    const openBtn = e.target.closest("[data-outreach-id]");
    if (openBtn) {
      e.preventDefault();
      openOutreachModal(openBtn.dataset.outreachId);
      return;
    }
    if (e.target.closest("[data-close-partnership-modal]")) {
      closeOutreachModal();
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeOutreachModal();
  });
  document.getElementById("partnershipModalCopy")?.addEventListener("click", async () => {
    if (!outreachModalData) return;
    const text = outreachModalData.subject
      ? `Subject: ${outreachModalData.subject}\n\n${outreachModalData.body}`
      : outreachModalData.body;
    const btn = document.getElementById("partnershipModalCopy");
    try {
      await navigator.clipboard.writeText(text);
      btn.classList.add("copied");
      btn.textContent = "Copied";
      setTimeout(() => {
        btn.classList.remove("copied");
        btn.textContent = "Copy message";
      }, 1600);
    } catch (_) {}
  });
}

/* ---------- avatar sourcing ---------- */
function avatarSources(item) {
  const srcs = [];
  if (item.picture) srcs.push(item.picture);
  const pref = ["x","github","instagram","facebook","telegram","youtube","nostr","web","web_url","email"];
  const byType = {};
  item.links.forEach(l => { if (!byType[l.t]) byType[l.t] = l.v; });
  for (const t of pref) {
    const v = byType[t];
    if (!v) continue;
    if (t === "x") srcs.push(`https://unavatar.io/x/${v}?fallback=false`);
    else if (t === "github") srcs.push(`https://unavatar.io/github/${v}?fallback=false`);
    else if (t === "instagram") srcs.push(`https://unavatar.io/instagram/${v}?fallback=false`);
    else if (t === "telegram") srcs.push(`https://unavatar.io/telegram/${v}?fallback=false`);
    else if (t === "youtube") srcs.push(`https://unavatar.io/youtube/${v}?fallback=false`);
    else if (t === "nostr") srcs.push(`https://unavatar.io/nostr/${v}?fallback=false`);
    else if (t === "email") srcs.push(`https://unavatar.io/${v}?fallback=false`);
    else if (t === "web" || t === "web_url") {
      let host = v.replace(/^https?:\/\//,'').split('/')[0];
      srcs.push(`https://unavatar.io/${host}?fallback=false`);
      srcs.push(`https://www.google.com/s2/favicons?domain=${host}&sz=128`);
    }
    // facebook numeric ids don't resolve well on unavatar; skip
  }
  return srcs;
}

const PALETTE = ["#f7931a","#3ecf8e","#5b8def","#c678dd","#e8b93b","#ef7d7d","#4ec9c9","#d98adb"];
function colorFor(name){ let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0; return PALETTE[h%PALETTE.length]; }
function initials(name){
  const clean = name.replace(/[#@]/g,'').trim();
  const parts = clean.split(/[\s/]+/).filter(Boolean);
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[1][0]).toUpperCase();
}

const CONF_LABEL = { ok:"Verified", warn:"Verify", dead:"Dead" };
const CONF_ICON = {
  ok: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10-4-4"/></svg>',
  warn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>',
  dead: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>'
};

function confBadgeHTML(conf, { iconOnly = false } = {}) {
  const label = CONF_LABEL[conf] || conf;
  if (iconOnly) {
    return `<span class="conf-badge ${conf} icon-only" title="${label}" aria-label="${label}">${CONF_ICON[conf] || ""}</span>`;
  }
  return `<span class="conf-badge ${conf}">${label}</span>`;
}

function itemSearchText(item) {
  return [item.name, item.org||"", item.angle||"", ...(item.tags||[]),
    ...item.links.map(l=>l.v)].join(" ").toLowerCase();
}

function avatarHTML(item) {
  const srcs = avatarSources(item);
  const color = colorFor(item.name);
  const fallback = `<div class="avatar-fallback" style="background:${color}">${initials(item.name)}</div>`;
  if (!srcs.length) return fallback;
  const chain = JSON.stringify(srcs);
  return `<img class="avatar" alt="${item.name}" src="${srcs[0]}"
    data-srcs='${chain}' data-i="0"
    data-fallback='${fallback.replace(/'/g,"&#39;")}'
    onerror="avatarError(this)">`;
}

function isPriorityItem(item) {
  return item.priority || (item.tags || []).includes("priority");
}

function displayTags(tags) {
  return (tags || []).filter(t => t !== "priority");
}

function tagHTML(tag) {
  const cls = tag.toLowerCase() === "speaker" ? "tag tag--speaker" : "tag";
  return `<span class="${cls}">${tag}</span>`;
}

function tagsHTML(tags, { priority = false } = {}) {
  const parts = [...(priority ? ["Hit first"] : []), ...displayTags(tags)];
  if (!parts.length) return "—";
  return parts.map(tagHTML).join("");
}

function cardHTML(item, sectionId, trackId) {
  const star = isShortlistItem(item);
  const isPriority = isPriorityItem(item);
  const avatar = avatarHTML(item);
  const angle = item.angle ? `<div class="card-angle">${item.angle}</div>` : "";
  const org = item.org ? ` <span style="color:var(--ink-muted);font-weight:400;font-size:13px">· ${item.org}</span>` : "";
  const tags = tagsHTML(item.tags);
  const hitBadge = isPriority ? `<span class="hit-badge">Hit first</span>` : "";
  const messageBtn = messageCTAHTML(item, sectionId, trackId);
  const partnership = partnershipCTAHTML(item);
  const links = item.links.map(buildLink).join("");
  const search = itemSearchText(item);
  const pubkeyAttr = item.pubkey ? ` data-pubkey="${item.pubkey}"` : "";
  return `<div class="contact-item card ${star?'star':''}" data-conf="${item.conf}" data-shortlist="${star ? "1" : "0"}" data-search="${search.replace(/"/g,'')}" data-section="${sectionId}"${pubkeyAttr}>
    ${avatar}
    <div class="card-body">
      <div class="card-name">${item.name}${org}${hitBadge}${confBadgeHTML(item.conf)}</div>
      ${angle}
      ${tags !== "—" ? `<div class="card-tags">${tags}</div>` : ""}
      ${messageBtn}
      ${partnership}
      ${links?`<div class="links">${links}</div>`:""}
    </div>
  </div>`;
}

function rowHTML(item, sectionId, trackId) {
  const star = isShortlistItem(item);
  const isPriority = isPriorityItem(item);
  const avatar = avatarHTML(item);
  const org = item.org || "—";
  const angle = item.angle || "—";
  const tags = tagsHTML(item.tags, { priority: isPriority });
  const messageBtn = messageCTAHTML(item, sectionId, trackId);
  const partnership = partnershipCTAHTML(item);
  const linkBits = item.links.map(buildLink).join("");
  const links = (messageBtn || partnership || linkBits)
    ? `<div class="links">${messageBtn}${partnership}${linkBits}</div>`
    : "—";
  const search = itemSearchText(item);
  const pubkeyAttr = item.pubkey ? ` data-pubkey="${item.pubkey}"` : "";
  return `<tr class="contact-item ${star?'star':''}" data-conf="${item.conf}" data-shortlist="${star ? "1" : "0"}" data-search="${search.replace(/"/g,'')}" data-section="${sectionId}"${pubkeyAttr}>
    <td class="cell-star">${star ? "★" : ""}</td>
    <td class="cell-name"><div class="cell-name-inner">${avatar}<span>${item.name}</span></div></td>
    <td class="cell-org">${org}</td>
    <td class="cell-angle">${angle}</td>
    <td class="cell-tags">${tags}</td>
    <td class="cell-status">${confBadgeHTML(item.conf, { iconOnly: true })}</td>
    <td class="cell-links">${links !== "—" ? links : "—"}</td>
  </tr>`;
}

function avatarError(img){
  const srcs = JSON.parse(img.getAttribute('data-srcs'));
  let i = parseInt(img.getAttribute('data-i'),10) + 1;
  if (i < srcs.length) {
    img.setAttribute('data-i', i);
    img.src = srcs[i];
  } else {
    const fb = img.getAttribute('data-fallback').replace(/&#39;/g,"'");
    img.outerHTML = fb;
  }
}

/* ---------- render ---------- */
function sectionHTML(sec) {
  const count = sec.groups.reduce((n, g) => n + g.items.length, 0);
  const campaign = campaignForSection(sec.id);
  let html = `<section class="section" id="sec-${sec.id}">
    <div class="section-head">
      <span class="flag">${sec.flag}</span>
      <h2>${sec.title}</h2>
      <span class="count">${count}</span>
    </div>`;
  if (sec.note) html += `<div class="section-note ${sec.caveat ? "caveat" : ""}">${sec.note}</div>`;
  html += campaignHTML(campaign);
  sec.groups.forEach(g => {
    if (g.title) html += `<div class="subsection-title">${g.title}</div>`;
    html += `<div class="grid">`;
    html += g.items.map(it => cardHTML(it, sec.id)).join("");
    html += `</div>`;
    html += `<div class="table-wrap"><table class="contact-table">
      <colgroup>
        <col class="col-star" /><col class="col-name" /><col class="col-org" />
        <col class="col-angle" /><col class="col-tags" /><col class="col-status" /><col class="col-links" />
      </colgroup>
      <thead><tr>
        <th class="cell-star">★</th><th class="cell-name">Name</th><th class="cell-org">Org</th>
        <th class="cell-angle">Notes</th><th class="cell-tags">Tags</th>${STATUS_COL_HEAD}<th class="cell-links">Contact</th>
      </tr></thead><tbody>`;
    html += g.items.map(it => rowHTML(it, sec.id)).join("");
    html += `</tbody></table></div>`;
  });
  html += `<div class="no-results hidden" id="noResults-${sec.id}">No contacts match your filters.</div>`;
  html += `</section>`;
  return html;
}

function render() {
  outreachStore.clear();
  outreachSeq = 0;
  const sections = activeSections();
  const ev = activeEvent();
  const hubLayout = document.getElementById("hubLayout");
  const emptyEvent = document.getElementById("emptyEvent");
  const statsEl = document.getElementById("stats");
  const hubSectionPanels = document.getElementById("hubSectionPanels");

  if (!sections.length) {
    if (hubLayout) hubLayout.hidden = true;
    if (emptyEvent) {
      emptyEvent.hidden = false;
      emptyEvent.textContent = ev.emptyMessage;
    }
    statsEl.innerHTML = `
      <div class="stat"><div class="num">0</div><div class="lbl">Total contacts</div></div>
      <div class="stat ok"><div class="num">0</div><div class="lbl">Verified</div></div>
      <div class="stat warn"><div class="num">0</div><div class="lbl">Verify first</div></div>
      <div class="stat accent"><div class="num">0</div><div class="lbl">★ Shortlist</div></div>
      <div class="stat"><div class="num">0</div><div class="lbl">Regions</div></div>`;
    document.getElementById("contactToolbar")?.classList.add("hidden");
    bindCopyLinks();
    return;
  }

  if (hubLayout) hubLayout.hidden = false;
  if (emptyEvent) emptyEvent.hidden = true;

  let allItems = [];
  sections.forEach(sec => {
    sec.groups.forEach(g => g.items.forEach(it => allItems.push({ ...it, sectionId: sec.id })));
  });

  if (hubSectionPanels) {
    const sectionPanels = sections.map((sec) =>
      `<div class="hub-panel" data-panel="${sec.id}" id="panel-${sec.id}">${sectionHTML(sec)}</div>`
    ).join("");
    const trackPanels = trackCampaigns().map((t) =>
      `<div class="hub-panel" data-panel="${t.id}" id="panel-${t.id}">${trackPanelHTML(t.id)}</div>`
    ).join("");
    hubSectionPanels.innerHTML = sectionPanels + trackPanels;
  }

  const total = allItems.length;
  const ok = allItems.filter(i => i.conf === "ok").length;
  const warn = allItems.filter(i => i.conf === "warn").length;
  const star = allItems.filter(i => isShortlistItem(i)).length;
  statsEl.innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="lbl">Total contacts</div></div>
    <div class="stat ok"><div class="num">${ok}</div><div class="lbl">Verified</div></div>
    <div class="stat warn"><div class="num">${warn}</div><div class="lbl">Verify first</div></div>
    <div class="stat accent"><div class="num">${star}</div><div class="lbl">★ Shortlist</div></div>
    <div class="stat"><div class="num">${sections.length}</div><div class="lbl">Regions</div></div>`;

  updateHubPanelsVisibility();
  renderHubNav();
  setHubTab(normalizeHubTab(state.hubTab));
  applyFilters();
  bindCopyLinks();
  bindMsgCopy();
  hydrateNostrPictures();
}

const NOSTR_RELAYS = [
  "wss://relay.damus.io",
  "wss://nos.lol",
  "wss://relay.primal.net",
  "wss://purplepag.es",
];

function fetchKind0Profile(pubkey) {
  return new Promise((resolve) => {
    let pending = NOSTR_RELAYS.length;
    let resolved = false;
    const finish = (profile) => {
      if (resolved) return;
      if (profile) {
        resolved = true;
        resolve(profile);
      } else if (--pending === 0) {
        resolve(null);
      }
    };
    for (const relay of NOSTR_RELAYS) {
      try {
        const ws = new WebSocket(relay);
        const sub = "osh" + Math.random().toString(36).slice(2, 10);
        const timer = setTimeout(() => {
          try { ws.close(); } catch (_) {}
          finish(null);
        }, 5000);
        ws.onopen = () => {
          ws.send(JSON.stringify(["REQ", sub, { kinds: [0], authors: [pubkey], limit: 1 }]));
        };
        ws.onmessage = (ev) => {
          let msg;
          try { msg = JSON.parse(ev.data); } catch { return; }
          if (msg[0] === "EVENT" && msg[2]?.kind === 0) {
            clearTimeout(timer);
            try {
              const meta = JSON.parse(msg[2].content);
              ws.send(JSON.stringify(["CLOSE", sub]));
              ws.close();
              finish(meta);
            } catch {
              finish(null);
            }
          } else if (msg[0] === "EOSE") {
            clearTimeout(timer);
            try { ws.close(); } catch (_) {}
            finish(null);
          }
        };
        ws.onerror = () => {
          clearTimeout(timer);
          finish(null);
        };
      } catch {
        finish(null);
      }
    }
  });
}

function setAvatarForPubkey(pubkey, url) {
  if (!pubkey || !url) return;
  document.querySelectorAll(`.contact-item[data-pubkey="${pubkey}"] .avatar`).forEach((img) => {
    img.src = url;
    img.removeAttribute("onerror");
  });
}

function hydrateNostrPictures() {
  const speakers = typeof OPEN_SOURCE_NOSTR_SPEAKERS !== "undefined" ? OPEN_SOURCE_NOSTR_SPEAKERS : [];
  speakers
    .filter((s) => s.pubkey && !s.picture)
    .forEach(async (speaker) => {
      const meta = await fetchKind0Profile(speaker.pubkey);
      if (meta?.picture) setAvatarForPubkey(speaker.pubkey, meta.picture);
    });
}

/* ---------- filtering & view ---------- */
const urlParams = new URLSearchParams(window.location.search);

function syncUrlParams() {
  const params = new URLSearchParams(window.location.search);
  params.set("view", state.view);
  params.set("location", state.hubTab);
  const qs = params.toString();
  const next = qs ? `${window.location.pathname}?${qs}` : window.location.pathname;
  const current = `${window.location.pathname}${window.location.search}`;
  if (current !== next) history.replaceState({ view: state.view, location: state.hubTab }, "", next);
}

const state = {
  event: localStorage.getItem("osh-event") || "asia-2026",
  hubTab: urlParams.get("location") || localStorage.getItem("osh-hub-tab") || "influencers",
  q: "",
  view: (() => {
    const v = urlParams.get("view");
    if (v === "table" || v === "grid") return v;
    return localStorage.getItem("outreach-view") || localStorage.getItem("apac-view") || "table";
  })(),
  theme: document.documentElement.getAttribute("data-theme") || "dark",
  conf: { ok: true, warn: true, dead: false },
  shortlistOnly: localStorage.getItem("osh-shortlist-only") === "1",
};
if (!EVENTS[state.event]) state.event = "asia-2026";
state.hubTab = normalizeHubTab(state.hubTab);

function setTheme(theme) {
  state.theme = theme;
  localStorage.setItem("osh-theme", theme);
  document.documentElement.setAttribute("data-theme", theme);
  const btn = document.getElementById("themeToggle");
  if (btn) btn.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
}

function toggleTheme() {
  setTheme(state.theme === "dark" ? "light" : "dark");
}

function setHubNavCollapsed(collapsed, { persist = true } = {}) {
  const layout = document.getElementById("hubLayout");
  const btn = document.getElementById("hubNavCollapse");
  if (!layout || !btn) return;
  layout.classList.toggle("hub-nav-collapsed", collapsed);
  btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
  btn.setAttribute("aria-label", collapsed ? "Expand sidebar" : "Collapse sidebar");
  btn.title = collapsed ? "Expand sidebar" : "Collapse sidebar";
  if (persist) localStorage.setItem("osh-hub-nav-collapsed", collapsed ? "1" : "0");
}

function toggleHubNavCollapsed() {
  const layout = document.getElementById("hubLayout");
  setHubNavCollapsed(!layout?.classList.contains("hub-nav-collapsed"));
}

function setView(view, { syncUrl = true } = {}) {
  state.view = view;
  localStorage.setItem("outreach-view", view);
  document.body.classList.remove("view-grid", "view-table");
  document.body.classList.add("view-" + view);
  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.view === view);
  });
  if (syncUrl) syncUrlParams();
}

function applyFilters() {
  const panel = document.getElementById("panel-" + state.hubTab);
  if (!panel) return;
  const items = panel.querySelectorAll(".contact-item");
  let visible = 0;
  items.forEach(c => {
    const confOk = state.conf[c.dataset.conf];
    const qOk = !state.q || c.dataset.search.includes(state.q);
    const starOk = !state.shortlistOnly || c.dataset.shortlist === "1";
    const show = confOk && qOk && starOk;
    c.classList.toggle("hidden", !show);
    if (show) visible++;
  });
  panel.querySelectorAll(".grid, .table-wrap").forEach(block => {
    const gv = block.querySelectorAll(".contact-item:not(.hidden)").length > 0;
    block.classList.toggle("hidden", !gv);
    const prev = block.previousElementSibling;
    if (prev && prev.classList.contains("subsection-title")) prev.classList.toggle("hidden", !gv);
  });
  const noResults = panel.querySelector("#noResults-" + state.hubTab);
  if (noResults) noResults.classList.toggle("hidden", visible > 0);
}

function bindCopyLinks() {
  document.querySelectorAll(".link.copy").forEach(el => {
    el.addEventListener("click", () => {
      navigator.clipboard?.writeText(el.dataset.copy);
      const span = el.querySelector("span");
      const orig = span.textContent;
      el.classList.add("copied"); span.textContent = "Copied!";
      setTimeout(() => { el.classList.remove("copied"); span.textContent = orig; }, 1200);
    });
  });
}

let eventsInitialized = false;
function bindEvents() {
  if (eventsInitialized) return;
  eventsInitialized = true;

  setView(state.view);
  setHubNavCollapsed(localStorage.getItem("osh-hub-nav-collapsed") === "1", { persist: false });
  renderEventTabs();
  updateEventHeader();
  bindOutreachModal();

  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.addEventListener("click", () => setView(btn.dataset.view));
  });
  document.getElementById("eventTabs")?.addEventListener("click", e => {
    const tab = e.target.closest(".event-tab");
    if (tab) switchEvent(tab.dataset.event);
  });
  document.querySelectorAll(".conf-toggle").forEach(btn => {
    const k = btn.dataset.conf;
    btn.classList.toggle("off", !state.conf[k]);
    btn.addEventListener("click", () => {
      state.conf[k] = !state.conf[k];
      btn.classList.toggle("off", !state.conf[k]);
      applyFilters();
    });
  });
  const shortlistBtn = document.getElementById("shortlistToggle");
  if (shortlistBtn) {
    shortlistBtn.classList.toggle("active", state.shortlistOnly);
    shortlistBtn.setAttribute("aria-pressed", state.shortlistOnly ? "true" : "false");
    shortlistBtn.addEventListener("click", () => {
      state.shortlistOnly = !state.shortlistOnly;
      localStorage.setItem("osh-shortlist-only", state.shortlistOnly ? "1" : "0");
      shortlistBtn.classList.toggle("active", state.shortlistOnly);
      shortlistBtn.setAttribute("aria-pressed", state.shortlistOnly ? "true" : "false");
      applyFilters();
    });
  }
  document.getElementById("search")?.addEventListener("input", e => {
    state.q = e.target.value.trim().toLowerCase();
    applyFilters();
  });
  document.getElementById("themeToggle")?.addEventListener("click", toggleTheme);
  document.getElementById("hubNavCollapse")?.addEventListener("click", toggleHubNavCollapsed);

  window.addEventListener("popstate", () => {
    const params = new URLSearchParams(window.location.search);
    const view = params.get("view");
    if (view === "table" || view === "grid") setView(view, { syncUrl: false });
    const location = params.get("location");
    if (location) setHubTab(location, { syncUrl: false });
  });

  syncUrlParams();
}

bindEvents();
render();
window.setHubTab = setHubTab;
</script>
